name: Build and Test Chromium Base

on:
  push:
    paths:
      - "Dockerfile"
      - ".github/workflows/build-chromium-base.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

env:
  IMAGE_NAME: anonymouz/nodejs-chromium-base

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build amd64 image for PDF smoke
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          load: true
          tags: test-chromium-image:amd64
          cache-from: type=gha,scope=nodejs-chromium-amd64
          cache-to: type=gha,mode=max,scope=nodejs-chromium-amd64

      - name: Test PDF Generation (amd64)
        run: |
          docker run --rm --platform linux/amd64 test-chromium-image:amd64 sh -c \
            'test -x "$CHROMIUM_EXECUTABLE" && \
             "$CHROMIUM_EXECUTABLE" --headless --no-sandbox --disable-dev-shm-usage --disable-gpu \
               --print-to-pdf=/tmp/test.pdf https://www.chromium.org/chromium-projects/ && \
             ls -la /tmp/test.pdf && \
             [ -s /tmp/test.pdf ] || (echo "PDF test failed" && exit 1)'

      - name: Build and push multi-arch (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}-${{ github.run_id }}
          cache-from: type=gha,scope=nodejs-chromium-multi
          cache-to: type=gha,mode=max,scope=nodejs-chromium-multi

      - name: Clean up old images in Docker Hub
        if: success()
        run: |
          echo "Logging into Docker Hub API..."
          TOKEN=$(curl -s -H "Content-Type: application/json" -X POST -d '{"username": "'${{ secrets.DOCKERHUB_USERNAME }}'", "password": "'${{ secrets.DOCKERHUB_TOKEN }}'"}' https://hub.docker.com/v2/users/login/ | jq -r .token)

          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "Failed to get API token. Check credentials and token permissions."
            exit 1
          fi

          echo "Fetching tags..."
          TAGS=$(curl -s -H "Authorization: JWT ${TOKEN}" "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/?page_size=100&ordering=-last_updated" | jq -r '.results[].name' | grep -v '^latest$')

          TAGS_ARRAY=($TAGS)

          KEEP=3

          if [ ${#TAGS_ARRAY[@]} -gt $KEEP ]; then
            echo "Found ${#TAGS_ARRAY[@]} tags (excluding latest). Keeping the newest $KEEP."

            for tag in "${TAGS_ARRAY[@]:$KEEP}"; do
              echo "Deleting old tag: $tag"
              curl -s -X DELETE -H "Authorization: JWT ${TOKEN}" "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/$tag/"
            done
          else
            echo "Cleanup not needed. Total historical tags: ${#TAGS_ARRAY[@]}"
          fi
